{% extends "base.html" %}

{% block body %}
<!-- Contact Section-->
<section class="page-section mt-5" id="contact">
    <div class="container">
        <!-- Contact Section Heading-->
        <h2 class="page-section-heading text-center text-uppercase text-secondary mb-0">Register Here</h2>

        <!-- Icon Divider-->
        <div class="divider-custom">
            <div class="divider-custom-line"></div>
            <div class="divider-custom-icon"><i class="fas fa-star"></i></div>
            <div class="divider-custom-line"></div>
        </div>

        <!-- Contact Section Form-->
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">
                <form id="contactForm" data-sb-form-api-token="API_TOKEN" method="post">
                    {% csrf_token %}
                    <div class="row">
                        <!-- Name input-->
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="fname" name="fname" type="text" placeholder="Enter your name..."
                                    data-sb-validations="required" />
                                <label for="name">First Name</label>
                                <div class="invalid-feedback" data-sb-feedback="name:required">A name is required.</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="lname" name="lname" type="text" placeholder="Enter your name..."
                                    data-sb-validations="required" />
                                <label for="name">Last Name</label>
                                <div class="invalid-feedback" data-sb-feedback="name:required">A name is required.</div>
                            </div>
                        </div>
                        <!-- Email input-->
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="username" name="username" type="email" placeholder="name@example.com"
                                    data-sb-validations="required,email" />
                                <label for="email">Username</label>
                                <div class="invalid-feedback" data-sb-feedback="email:required">An email is required.</div>
                                <div class="invalid-feedback" data-sb-feedback="email:email">Email is not valid.</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="password" name="password" type="password" 
                                    data-sb-validations="required" />
                                <label for="phone">Password</label>
                                <div class="invalid-feedback" data-sb-feedback="phone:required">A phone number is required.</div>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="cpassword" type="password" name="cpassword" placeholder="(123) 456-7890"
                                    data-sb-validations="required" />
                                <label for="phone">Confirm Password</label>
                                <div class="invalid-feedback" data-sb-feedback="phone:required">A phone number is required.</div>
                            </div>
                        </div>

                    </div>
                    <button class="btn  btn-xl w-100" id="submitButton" type="submit" style="background-color: #2c3e50; color: #fff;">Register Here</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock body %}
